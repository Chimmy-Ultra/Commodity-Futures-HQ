<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#d97757"/>

  <!-- Body (main square) -->
  <rect x="28" y="30" width="44" height="38" rx="4" fill="#c4613d"/>

  <!-- Left arm -->
  <rect x="14" y="36" width="14" height="12" rx="3" fill="#c4613d"/>
  <!-- Right arm -->
  <rect x="72" y="36" width="14" height="12" rx="3" fill="#c4613d"/>

  <!-- Left leg -->
  <rect x="30" y="66" width="12" height="12" rx="2" fill="#c4613d"/>
  <!-- Right leg -->
  <rect x="58" y="66" width="12" height="12" rx="2" fill="#c4613d"/>

  <!-- Left eye: > shape -->
  <polyline points="35,38 42,43 35,48" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right eye: < shape -->
  <polyline points="65,38 58,43 65,48" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
